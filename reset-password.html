<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password — NSE Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f5f5f0;min-height:100dvh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;padding:14px 24px;
  border-bottom:1px solid #e0e0e0;background:#fff;gap:10px;}
.brand-icon{font-size:20px;}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.02em;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.card{width:100%;max-width:420px;background:#fff;border:1px solid #e0e0e0;
  border-radius:20px;padding:36px;box-shadow:0 4px 32px rgba(0,0,0,.07);
  animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.title{font-size:20px;font-weight:700;margin-bottom:6px;}
.subtitle{font-size:13px;color:#888;margin-bottom:24px;line-height:1.5;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:#666;
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.field input{width:100%;border:1px solid #e0e0e0;border-radius:10px;
  padding:10px 14px;font-size:14px;font-family:inherit;outline:none;
  background:#fafafa;transition:border-color .15s;}
.field input:focus{border-color:#27500A;background:#fff;}
.btn-primary{width:100%;padding:13px;border-radius:12px;border:none;
  background:#27500A;color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;margin-top:4px;transition:background .15s;}
.btn-primary:hover{background:#1a3d07;}
.btn-primary:disabled{background:#aaa;cursor:not-allowed;}
.msg{font-size:13px;min-height:18px;margin-top:10px;text-align:center;padding:8px;border-radius:8px;}
.msg.err{color:#A32D2D;background:#FCEBEB;border:1px solid #F09595;}
.msg.ok{color:#27500A;background:#EAF3DE;border:1px solid #C0DD97;}
.back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#888;text-decoration:none;}
.back:hover{color:#27500A;}
.step{display:none;}
.step.active{display:block;}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand-icon">&#128200;</span>
  <span class="brand-name">NSE Scanner — Reset Password</span>
</div>
<div class="main">
  <div class="card">

    <!-- Step 1: Change password (for logged-in users) -->
    <div class="step active" id="step-change">
      <div class="title">Change Password</div>
      <div class="subtitle">Enter your current password and choose a new one.</div>
      <div class="field">
        <label>Current password</label>
        <input id="currentPwd" type="password" placeholder="Current password"
               onkeydown="if(event.key==='Enter')document.getElementById('newPwd').focus()"/>
      </div>
      <div class="field">
        <label>New password</label>
        <input id="newPwd" type="password" placeholder="Min 8 characters"
               onkeydown="if(event.key==='Enter')document.getElementById('confirmPwd').focus()"/>
      </div>
      <div class="field">
        <label>Confirm new password</label>
        <input id="confirmPwd" type="password" placeholder="Repeat new password"
               onkeydown="if(event.key==='Enter')doChangePassword()"/>
      </div>
      <button class="btn-primary" id="changeBtn" onclick="doChangePassword()">
        Update password
      </button>
      <div class="msg" id="changeMsg"></div>
      <a href="scanner.html" class="back">&#8592; Back to Scanner</a>
    </div>

  </div>
</div>

<script>
const PROXY = 'https://nse-proxy-mojx.onrender.com';

async function doChangePassword(){
  var cur  = document.getElementById('currentPwd').value;
  var nw   = document.getElementById('newPwd').value;
  var conf = document.getElementById('confirmPwd').value;
  var msg  = document.getElementById('changeMsg');
  var btn  = document.getElementById('changeBtn');

  if(!cur || !nw){
    msg.textContent='Fill in all fields';msg.className='msg err';return;
  }
  if(nw.length < 8){
    msg.textContent='New password must be at least 8 characters';msg.className='msg err';return;
  }
  if(nw !== conf){
    msg.textContent='New passwords do not match';msg.className='msg err';return;
  }

  btn.disabled=true; btn.textContent='Updating\u2026'; msg.textContent=''; msg.className='msg';

  var tok = localStorage.getItem('nse_app_token') || '';
  if(!tok){
    msg.textContent='Not logged in. Please login first.';
    msg.className='msg err';
    btn.disabled=false; btn.textContent='Update password';
    return;
  }

  try{
    var r = await fetch(PROXY+'/app/change-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Session-Token':tok},
      credentials: 'include',
      body: JSON.stringify({'current': cur, 'new': nw})
    });
    var d = await r.json();
    if(r.ok && d.status==='ok'){
      msg.textContent='\u2713 Password updated successfully! Redirecting\u2026';
      msg.className='msg ok';
      setTimeout(function(){ window.location.href='scanner.html'; }, 1500);
    } else {
      msg.textContent = d.error || 'Update failed';
      msg.className='msg err';
      btn.disabled=false; btn.textContent='Update password';
    }
  }catch(e){
    msg.textContent='Cannot reach server';
    msg.className='msg err';
    btn.disabled=false; btn.textContent='Update password';
  }
}
</script>
</body>
</html>
