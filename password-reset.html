<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Password — NSE Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f5f5f0;min-height:100dvh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;padding:14px 24px;gap:10px;
  border-bottom:1px solid #e0e0e0;background:#fff;}
.brand-icon{font-size:20px;}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.02em;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.card{width:100%;max-width:420px;background:#fff;border:1px solid #e0e0e0;
  border-radius:20px;padding:36px;box-shadow:0 4px 32px rgba(0,0,0,.07);
  animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.title{font-size:20px;font-weight:700;margin-bottom:6px;}
.subtitle{font-size:13px;color:#888;margin-bottom:24px;line-height:1.5;}
.divider{height:1px;background:#f0f0f0;margin:0 0 20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:#666;
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.field input{width:100%;border:1px solid #e0e0e0;border-radius:10px;
  padding:10px 14px;font-size:14px;font-family:inherit;outline:none;
  background:#fafafa;transition:border-color .15s;}
.field input:focus{border-color:#27500A;background:#fff;}
.btn-primary{width:100%;padding:13px;border-radius:12px;border:none;
  background:#27500A;color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;margin-top:4px;transition:background .15s;font-family:inherit;}
.btn-primary:hover{background:#1a3d07;}
.btn-primary:disabled{background:#aaa;cursor:not-allowed;}
.msg{font-size:13px;min-height:18px;margin-top:12px;text-align:center;
  padding:10px;border-radius:8px;display:none;}
.msg.err{color:#A32D2D;background:#FCEBEB;border:1px solid #F09595;display:block;}
.msg.ok{color:#27500A;background:#EAF3DE;border:1px solid #C0DD97;display:block;}
.back{display:block;text-align:center;margin-top:16px;font-size:13px;color:#888;
  text-decoration:none;transition:color .15s;}
.back:hover{color:#27500A;}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand-icon">&#128200;</span>
  <span class="brand-name">NSE Scanner — Change Password</span>
</div>
<div class="main">
  <div class="card">
    <div class="title">&#128274; Change Password</div>
    <div class="subtitle">Enter your username and current password to set a new one.</div>
    <div class="divider"></div>

    <div class="field">
      <label>Username</label>
      <input id="username" type="text" autocomplete="username"
             placeholder="Your username"
             onkeydown="if(event.key==='Enter')document.getElementById('currentPwd').focus()"/>
    </div>
    <div class="field">
      <label>Current password</label>
      <input id="currentPwd" type="password" autocomplete="current-password"
             placeholder="Your current password"
             onkeydown="if(event.key==='Enter')document.getElementById('newPwd').focus()"/>
    </div>
    <div class="field">
      <label>New password</label>
      <input id="newPwd" type="password" autocomplete="new-password"
             placeholder="Min 8 characters"
             onkeydown="if(event.key==='Enter')document.getElementById('confirmPwd').focus()"/>
    </div>
    <div class="field">
      <label>Confirm new password</label>
      <input id="confirmPwd" type="password" autocomplete="new-password"
             placeholder="Repeat new password"
             onkeydown="if(event.key==='Enter')doChangePassword()"/>
    </div>

    <button class="btn-primary" id="changeBtn" onclick="doChangePassword()">
      Update password
    </button>
    <div class="msg" id="changeMsg"></div>
    <a href="login.html" class="back">&#8592; Back to Login</a>
  </div>
</div>

<script>
const PROXY = 'https://nse-proxy-mojx.onrender.com';

async function doChangePassword(){
  var username = document.getElementById('username').value.trim();
  var cur      = document.getElementById('currentPwd').value;
  var nw       = document.getElementById('newPwd').value;
  var conf     = document.getElementById('confirmPwd').value;
  var msg      = document.getElementById('changeMsg');
  var btn      = document.getElementById('changeBtn');

  msg.className = 'msg';

  if(!username){ msg.textContent='Enter your username'; msg.className='msg err'; return; }
  if(!cur)     { msg.textContent='Enter current password'; msg.className='msg err'; return; }
  if(nw.length < 8){ msg.textContent='New password must be at least 8 characters'; msg.className='msg err'; return; }
  if(nw !== conf)  { msg.textContent='New passwords do not match'; msg.className='msg err'; return; }

  btn.disabled = true;
  btn.textContent = 'Updating\u2026';

  try{
    // Step 1: login with current credentials to get session
    var loginResp = await fetch(PROXY+'/app/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({username: username, password: cur})
    });
    var loginData = await loginResp.json();
    if(!loginResp.ok || loginData.status !== 'ok'){
      msg.textContent = loginData.error || 'Incorrect username or current password';
      msg.className = 'msg err';
      btn.disabled = false; btn.textContent = 'Update password';
      return;
    }

    var sessionToken = loginData.token;

    // Step 2: change password
    var changeResp = await fetch(PROXY+'/app/change-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Session-Token':sessionToken},
      credentials: 'include',
      body: JSON.stringify({'current': cur, 'new': nw})
    });
    var changeData = await changeResp.json();

    if(changeResp.ok && changeData.status === 'ok'){
      // Store new session token
      localStorage.setItem('nse_app_token', sessionToken);
      msg.textContent = '\u2713 Password updated! Redirecting to scanner\u2026';
      msg.className = 'msg ok';
      setTimeout(function(){ window.location.href = 'scanner.html'; }, 1500);
    } else {
      msg.textContent = changeData.error || 'Failed to update password';
      msg.className = 'msg err';
      btn.disabled = false; btn.textContent = 'Update password';
    }
  }catch(e){
    msg.textContent = 'Cannot reach server — check your connection';
    msg.className = 'msg err';
    btn.disabled = false; btn.textContent = 'Update password';
  }
}

// Pre-fill username from localStorage if available
var savedUser = localStorage.getItem('nse_username');
if(savedUser) document.getElementById('username').value = savedUser;
</script>
</body>
</html>
