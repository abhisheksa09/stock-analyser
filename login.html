<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — NSE Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f5f5f0;color:#1a1a1a;min-height:100dvh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid #e0e0e0;background:#fff;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{font-size:20px;}.brand-name{font-size:15px;font-weight:700;letter-spacing:-.02em;}
.brand-ver{font-size:10px;color:#aaa;border:1px solid #e0e0e0;border-radius:20px;padding:2px 8px;background:#fafafa;}
.top-links{display:flex;gap:8px;}
.top-link{font-size:12px;color:#666;text-decoration:none;padding:5px 12px;border:1px solid #ddd;
  border-radius:20px;background:#fff;transition:all .15s;}
.top-link:hover{border-color:#27500A;color:#27500A;background:#EAF3DE;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.card{width:100%;max-width:380px;background:#fff;border:1px solid #e0e0e0;border-radius:20px;
  padding:40px 36px;box-shadow:0 4px 32px rgba(0,0,0,.07);animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.hero{text-align:center;margin-bottom:28px;}
.hero-icon{width:68px;height:68px;border-radius:20px;background:#EAF3DE;border:2px solid #C0DD97;
  margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:30px;}
.hero h1{font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px;}
.hero p{font-size:13px;color:#888;line-height:1.5;}
.divider{height:1px;background:#f0f0f0;margin:0 0 22px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:#666;
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.field input{width:100%;border:1px solid #e0e0e0;border-radius:10px;padding:10px 14px;
  font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:#fafafa;}
.field input:focus{border-color:#27500A;background:#fff;}
.btn-login{width:100%;padding:13px 20px;border-radius:12px;border:none;
  background:#27500A;color:#fff;font-size:14px;font-weight:600;cursor:pointer;
  margin-top:8px;transition:background .15s,transform .12s;font-family:inherit;}
.btn-login:hover{background:#1a3d07;transform:translateY(-1px);}
.btn-login:disabled{background:#aaa;transform:none;cursor:not-allowed;}
.msg{font-size:13px;min-height:18px;margin-top:10px;text-align:center;}
.msg.err{color:#A32D2D;}.msg.ok{color:#27500A;}
.chips{display:flex;justify-content:center;gap:8px;margin-top:20px;flex-wrap:wrap;}
.chip{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid #e0e0e0;
  color:#888;background:#fafafa;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <span class="brand-icon">&#128200;</span>
    <span class="brand-name">NSE Scanner</span>
    <span class="brand-ver">v2.2.0</span>
  </div>
</div>
<div class="main">
  <div class="card">
    <div class="hero">
      <div class="hero-icon">&#128200;</div>
      <h1>NSE Intraday Scanner</h1>
      <p>Real-time signals &middot; Macro intelligence &middot; Telegram alerts</p>
    </div>
    <div class="divider"></div>
    <div class="field">
      <label>Username</label>
      <input id="username" type="text" autocomplete="username" placeholder="Enter username"
             autofocus onkeydown="if(event.key==='Enter')document.getElementById('password').focus()"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Enter password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign in</button>
    <div class="msg" id="msg"></div>
    <div class="chips">
      <span class="chip">30 Nifty stocks</span>
      <span class="chip">Telegram alerts</span>
      <span class="chip">4-layer macro</span>
    </div>
      <!-- Forgot password -->
    <div style="text-align:center;margin-top:6px;">
      <a href="password-reset.html" style="font-size:12px;color:#888;text-decoration:underline;">
        Forgot password?
      </a>
    </div>
  </div>
</div>
<script>
const PROXY='https://nse-proxy-mojx.onrender.com';

// ── Render wake-up overlay ────────────────────────────────────────────────────
(function(){
  var RENDER_HOST = 'nse-proxy-mojx.onrender.com';
  var _pending = 0;
  var _timer = null;
  var _overlay = null;

  var _wakeStart = 0;
  var _msgInterval = null;
  var _tickInterval = null;
  var _msgIdx = 0;
  var _MSGS = [
    ['☕', 'Making the server a coffee first…'],
    ['🐹', 'The hamsters that power this thing are stretching…'],
    ['💤', 'Free tier: napping harder than you on a Sunday.'],
    ['🥱', 'Render said "5 more minutes." That was 20s ago.'],
    ['🪙', 'This app runs on good vibes and zero budget.'],
    ['🧊', 'Cold start loading… (it's literally sleeping on ice)'],
    ['🚀', 'Almost there. Probably. Fingers crossed.'],
    ['🐢', 'Free hosting: fast to set up, slow to wake up.'],
    ['⚡', 'Your patience is the premium plan.'],
    ['🎁', 'Free tier waking up — the best things in life take 40s.'],
  ];

  function showOverlay(){
    if(_overlay) return;
    _wakeStart = Date.now();
    _msgIdx = 0;
    _overlay = document.createElement('div');
    _overlay.id = '_renderWakeOverlay';
    _overlay.style.cssText = [
      'position:fixed','top:0','left:0','width:100%','height:100%',
      'background:rgba(0,0,0,.55)','z-index:99999',
      'display:flex','align-items:center','justify-content:center',
      'backdrop-filter:blur(3px)','-webkit-backdrop-filter:blur(3px)'
    ].join(';');
    _overlay.innerHTML =
      '<div style="background:#fff;border-radius:20px;padding:32px 28px;' +
      'max-width:340px;width:90%;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,.22);">' +
        '<div id="_rwEmoji" style="font-size:44px;margin-bottom:10px;line-height:1;transition:all .3s;">☕</div>' +
        '<div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:8px;">Waking the server up…</div>' +
        '<div id="_rwMsg" style="font-size:13px;color:#666;min-height:36px;line-height:1.5;' +
        'transition:opacity .3s;margin-bottom:16px;">Making the server a coffee first…</div>' +
        '<div style="background:#f0f0f0;border-radius:99px;height:6px;overflow:hidden;margin-bottom:12px;">' +
          '<div id="_rwBar" style="height:100%;width:0%;background:linear-gradient(90deg,#4CAF50,#27500A);' +
          'border-radius:99px;transition:width .8s ease;"></div>' +
        '</div>' +
        '<div style="font-size:11px;color:#bbb;">Free hosting · Render cold start · <span id="_rwSec">0</span>s elapsed</div>' +
      '</div>';
    var style = document.createElement('style');
    style.textContent = '@keyframes _rwBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}';
    _overlay.appendChild(style);
    document.body.appendChild(_overlay);

    _msgInterval = setInterval(function(){
      _msgIdx = (_msgIdx + 1) % _MSGS.length;
      var em = document.getElementById('_rwEmoji');
      var tx = document.getElementById('_rwMsg');
      if(!em || !tx) return;
      em.style.opacity = '0'; tx.style.opacity = '0';
      setTimeout(function(){
        em.textContent = _MSGS[_msgIdx][0];
        tx.textContent = _MSGS[_msgIdx][1];
        em.style.opacity = '1'; tx.style.opacity = '1';
      }, 300);
    }, 4000);

    _tickInterval = setInterval(function(){
      var el = document.getElementById('_rwSec');
      var bar = document.getElementById('_rwBar');
      if(!el) return;
      var s = Math.round((Date.now() - _wakeStart) / 1000);
      el.textContent = s;
      if(bar) bar.style.width = Math.min(s / 55 * 100, 95) + '%';
    }, 1000);
  }

  function hideOverlay(){
    clearInterval(_msgInterval); _msgInterval = null;
    clearInterval(_tickInterval); _tickInterval = null;
    if(_overlay){ _overlay.remove(); _overlay = null; }
  }

  function onStart(){
    _pending++;
    if(_pending === 1){
      _timer = setTimeout(showOverlay, 2000);
    }
  }

  function onEnd(){
    _pending = Math.max(0, _pending - 1);
    if(_pending === 0){
      clearTimeout(_timer);
      hideOverlay();
    }
  }

  var _origFetch = window.fetch.bind(window);
  window.fetch = function(input, init){
    var url = (typeof input === 'string') ? input : (input && input.url) ? input.url : '';
    if(url.indexOf(RENDER_HOST) !== -1){
      onStart();
      return _origFetch(input, init).then(function(r){ onEnd(); return r; }, function(e){ onEnd(); throw e; });
    }
    return _origFetch(input, init);
  };
})();

async function checkSession(){
  var token=localStorage.getItem('nse_app_token');
  if(!token) return;
  try{
    var r=await fetch(PROXY+'/app/me',{
      headers:{'X-Session-Token':token},
      credentials:'include'
    });
    if(r.ok){var d=await r.json();if(d.authenticated){window.location.replace('scanner.html');return;}}
    localStorage.removeItem('nse_app_token');
  }catch(e){}
}

async function doLogin(){
  var u=document.getElementById('username').value.trim();
  var p=document.getElementById('password').value;
  var msg=document.getElementById('msg');
  var btn=document.getElementById('loginBtn');
  if(!u||!p){msg.textContent='Enter username and password';msg.className='msg err';return;}
  btn.disabled=true;btn.textContent='Signing in…';msg.textContent='';msg.className='msg';
  try{
    var r=await fetch(PROXY+'/app/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body:JSON.stringify({username:u,password:p})
    });
    var d=await r.json();
    if(r.ok&&d.status==='ok'){
        // clear any previous user's local cache before setting new session
      localStorage.removeItem('nse_v2');

      if(d.token) localStorage.setItem('nse_app_token',d.token);
      localStorage.setItem('nse_username',d.username);
      localStorage.setItem('nse_role', d.role || '');
      msg.textContent='✓ Welcome, '+d.username+'!';
      msg.className='msg ok';
      setTimeout(function(){window.location.replace('scanner.html');},600);
    } else {
      msg.textContent=d.error||'Login failed';
      msg.className='msg err';
      btn.disabled=false;btn.textContent='Sign in';
      document.getElementById('password').select();
    }
  }catch(e){
    console.error('Login error:', e);
    msg.textContent='Login failed: ' + (e && e.message ? e.message : 'network/CORS error');
    msg.className='msg err';
    btn.disabled=false;
    btn.textContent='Sign in';
}
}

checkSession();
</script>
</body>
</html>
