<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f5f5f0;color:#1a1a1a;min-height:100dvh;
  display:flex;flex-direction:column;
}

/* ── Top bar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid #e0e0e0;background:#fff;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{font-size:20px;}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.02em;}
.brand-ver{font-size:10px;color:#aaa;border:1px solid #e0e0e0;
  border-radius:20px;padding:2px 8px;background:#fafafa;}
.top-links{display:flex;gap:8px;}
.top-link{
  font-size:12px;color:#666;text-decoration:none;
  padding:5px 12px;border:1px solid #ddd;border-radius:20px;
  background:#fff;transition:all .15s;
}
.top-link:hover{border-color:#27500A;color:#27500A;background:#EAF3DE;}

/* ── Main ── */
.main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 24px;
}

/* ── Login card ── */
.card{
  width:100%;max-width:400px;
  background:#fff;border:1px solid #e0e0e0;border-radius:20px;
  padding:40px 36px;
  box-shadow:0 4px 32px rgba(0,0,0,.07);
  animation:fadeUp .3s ease;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:none}
}

/* ── Hero ── */
.hero{text-align:center;margin-bottom:32px;}
.hero-icon{
  width:72px;height:72px;border-radius:20px;
  background:#EAF3DE;border:2px solid #C0DD97;
  margin:0 auto 18px;display:flex;align-items:center;
  justify-content:center;font-size:32px;
}
.hero h1{font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px;}
.hero p{font-size:13px;color:#888;line-height:1.5;}

/* ── Divider ── */
.divider{height:1px;background:#f0f0f0;margin:0 0 24px;}

/* ── Status pill ── */
.status-row{
  display:flex;align-items:center;gap:8px;
  justify-content:center;margin-bottom:20px;
  min-height:20px;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:#e0e0e0;flex-shrink:0;
  transition:background .3s;
}
.status-dot.green{background:#639922;}
.status-dot.amber{background:#EF9F27;}
.status-dot.red{background:#E24B4A;}
.status-txt{font-size:13px;color:#888;}

/* ── Buttons ── */
.btn-primary{
  width:100%;display:flex;align-items:center;justify-content:center;
  gap:10px;padding:14px 20px;border-radius:12px;border:none;
  background:#27500A;color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:-.01em;margin-bottom:10px;
  transition:background .15s,transform .12s;font-family:inherit;
}
.btn-primary:hover{background:#1a3d07;transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}

.btn-enter{
  width:100%;padding:13px 20px;border-radius:12px;
  border:1px solid #C0DD97;background:#EAF3DE;color:#27500A;
  font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;
  transition:background .15s;font-family:inherit;
  display:none;
}
.btn-enter:hover{background:#d4edbc;}

/* ── Chips ── */
.chips{display:flex;justify-content:center;gap:8px;margin-top:20px;flex-wrap:wrap;}
.chip{
  font-size:11px;padding:4px 11px;border-radius:20px;
  border:1px solid #e0e0e0;color:#888;background:#fafafa;
}

/* ── Embedded chatbot ─────────────────────────────────────────────────────── */
#chatPanel{position:fixed;bottom:88px;right:24px;width:370px;height:540px;
  background:#fff;border:1px solid #e0e0e0;border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,.14);display:flex;flex-direction:column;
  z-index:9998;transform:scale(.92) translateY(20px);opacity:0;pointer-events:none;

.cp-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;

.cp-b ul{padding-left:14px;margin:4px 0;}
.cp-b li{margin-bottom:2px;}
.cp-b p{margin-bottom:5px;}
.cp-b p:last-child{margin-bottom:0;}
@keyframes cpUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.cp-dots{display:flex;gap:4px;align-items:center;padding:4px 0;}

.cp-sug:hover{border-color:#27500A;color:#27500A;background:#EAF3DE;}
.cp-foot{display:flex;gap:8px;padding:9px 12px;border-top:1px solid #f0f0f0;

.cp-btn{width:32px;height:32px;border-radius:8px;border:none;background:#27500A;

<script>
const PROXY = 'https://nse-proxy-mojx.onrender.com';

// ── Check if already logged in ────────────────────────────────────────────────
async function checkLogin(){
  setDot('amber', 'Checking\u2026');
  try{
    var r = await fetch(PROXY + '/get-token');
    if(!r.ok){ setDot('', 'Login to continue'); return; }
    var d = await r.json();
    if(d.status === 'ok' && d.token){
      // Token on server — verify it's still valid
      try{
        var pr = await fetch(PROXY + '/v2/user/profile', {
          headers: { 'Authorization': 'Bearer ' + d.token, 'Accept': 'application/json' }
        });
        var pd = await pr.json();
        if(pd.data){
          var name = pd.data.full_name || pd.data.user_name || pd.data.name || 'user';
          setDot('green', '\u2713 Logged in as ' + name);
          styleLoginBtn(true);
          document.getElementById('enterBtn').style.display = 'block';
          // Auto-redirect after brief pause
          setTimeout(goToScanner, 1500);
          return;
        }
      } catch(e2){}
    }
    setDot('', 'Login to continue');
  } catch(e){
    setDot('red', 'Cannot reach server');
  }
}

function setDot(cls, txt){
  var dot = document.getElementById('sDot');
  var t   = document.getElementById('sTxt');
  dot.className = 'status-dot' + (cls ? ' ' + cls : '');
  t.textContent = txt;
  t.style.color = cls === 'green' ? '#27500A' : cls === 'red' ? '#A32D2D' : '#888';
}

function styleLoginBtn(loggedIn){
  var btn = document.getElementById('loginBtn');
  if(loggedIn){
    btn.innerHTML = '&#128274;&nbsp; Re-login with Upstox';
    btn.style.background = '#EAF3DE';
    btn.style.color = '#27500A';
    btn.style.border = '1px solid #C0DD97';
  } else {
    btn.innerHTML = '&#128274;&nbsp; Login';
    btn.style.background = '#27500A';
    btn.style.color = '#fff';
    btn.style.border = 'none';
  }
}

// ── OAuth login ───────────────────────────────────────────────────────────────
function doLogin(){
  var w = 520, h = 640;
  var left = Math.round(screen.width/2 - w/2);
  var top  = Math.round(screen.height/2 - h/2);
  var pop  = window.open(
    PROXY + '/auth/login', 'upstox_login',
    'width='+w+',height='+h+',left='+left+',top='+top+
    ',toolbar=no,menubar=no,scrollbars=yes,resizable=yes'
  );
  if(!pop){ window.location.href = PROXY + '/auth/login'; return; }

  // Listen for success postMessage from popup
  var handler = function(e){
    if(e.data && e.data.type === 'upstox_auth_success'){
      window.removeEventListener('message', handler);
      setDot('amber', 'Login successful \u2014 syncing\u2026');
      setTimeout(checkLogin, 900);
    }
  };
  window.addEventListener('message', handler);
}

// ── Go to scanner ─────────────────────────────────────────────────────────────
function goToScanner(){
  window.location.href = 'scanner.html';
}

// ── Init ──────────────────────────────────────────────────────────────────────
checkLogin();
</script>

// ── NSE Scanner Knowledge Base ────────────────────────────────────────────────

  // ── LOGIN / AUTH ────────────────────────────────────────────────────────────
  { keys: ['login','upstox','auth','oauth','token','morning','how to start','get started'],
    q: 'How do I log in each morning?',

1. Open [login.html](login.html) on your phone
2. Tap **🔐 Login** → Upstox OTP screen → tap Authorize
3. Popup closes automatically → you're in

The scanner auto-detects your session next time — if you logged in today, opening the scanner redirects straight in without needing to login again.

**Token persists** in Supabase DB so Render restarts won't log you out.` },

  // ── SIGNAL ──────────────────────────────────────────────────────────────────
  { keys: ['buy signal','what is buy','buy means','buy decision'],
    q: 'What does a BUY signal mean?',
    a: `**BUY signal conditions (all 3 must be true):**

- RSI(14) < 40 — oversold, momentum turning up
- Price above VWAP — institutional buying pressure
- Price above ORB High — opening range breakout confirmed

**What to do:** place a limit order at the Entry price shown. Use the Stop Loss and Target shown in the expanded row.` },

  { keys: ['sell signal','what is sell','sell means','sell decision'],
    q: 'What does a SELL signal mean?',
    a: `**SELL signal conditions (all 3 must be true):**

- RSI(14) > 60 — overbought, momentum turning down
- Price below VWAP — selling pressure dominant
- Price below ORB Low — opening range breakdown confirmed

Note: SELL means shorting the stock intraday. Only trade this if your broker and account allow intraday short selling.` },

  { keys: ['watch','watch signal','why watch','watch means'],
    q: 'Why is my signal showing WATCH?',
    a: `**WATCH means mixed signals — skip this stock today.**

Common causes:
- Price is between ORB High and ORB Low (still in range)
- RSI is neutral (40–60) — no clear momentum
- Price near VWAP — no directional conviction
- Nifty ±0.5% hard block — market too volatile (this overrides BUY/SELL to WATCH)

**What to do:** wait for a cleaner setup or pick a different stock. WATCH signals have confidence capped at 45%.` },

  // ── CONFIDENCE ──────────────────────────────────────────────────────────────
  { keys: ['confidence','score','percent','how confidence','what is confidence','63%','78%','45%','55%','75%'],
    q: 'How is the confidence score calculated?',
    a: `**Confidence score = 6 weighted factors (0–100%)**

| Factor | Weight | Full score if… |
|--------|--------|---------------|
| ORB breakout | 25% | Clean break above/below ORB |
| Volume | 20% | ≥150% of 20-day average |
| VWAP alignment | 20% | Price on correct side of VWAP |
| RSI alignment | 15% | RSI in ideal range for signal |
| Risk:Reward | 15% | R:R ≥ 2:1 |
| ATR/volatility | 5% | Daily range in healthy zone |

**Then adjusted by:**
- Market context: Nifty trend, sector, gap, day trend (±5–15%)
- Macro penalties: crude, gold, FII flows, news sentiment (–50% to +8%)
- Candle confirmation: –20% if last 3 candles disagree

**Verdict:**
- ≥75% 🟢 Green — full position size
- 55–74% 🟡 Amber — half position size
- <55% 🔴 Red — skip this trade

Hover the confidence cell in any row to see the exact breakdown for that stock.` },

  // ── ORB ─────────────────────────────────────────────────────────────────────
  { keys: ['orb','opening range','breakout','breakdown','first 15','9:15','9:30'],
    q: 'What is ORB?',
    a: `**ORB = Opening Range Breakout**

The first 15 candles of the day (9:15–9:30 AM IST) define the opening range:
- **ORB High** = highest price in those 15 minutes
- **ORB Low** = lowest price in those 15 minutes

**Breakout** (BUY signal): price closes above ORB High → bullish momentum  
**Breakdown** (SELL signal): price closes below ORB Low → bearish momentum  
**Inside range**: price still between ORB High and Low → WATCH, wait

ORB has 25% weight in the confidence score — it's the most important single factor.` },

  // ── VWAP ────────────────────────────────────────────────────────────────────
  { keys: ['vwap','volume weighted','above vwap','below vwap'],
    q: 'What is VWAP?',
    a: `**VWAP = Volume Weighted Average Price**

Calculated from all intraday 1-minute candles: sum of (price × volume) ÷ total volume.

- **Price above VWAP** → institutions are net buyers → bullish (✓ for BUY)
- **Price below VWAP** → institutions are net sellers → bearish (✓ for SELL)

VWAP resets every day at 9:15 AM. It's a real-time institutional reference line.

Weight in confidence: **20%**` },

  // ── RSI ─────────────────────────────────────────────────────────────────────
  { keys: ['rsi','relative strength','oversold','overbought','rsi 14'],
    q: 'What does RSI mean in this scanner?',
    a: `**RSI(14) = 14-period Relative Strength Index** (calculated from daily closes)

- **RSI < 30** → Oversold — strong buying opportunity for BUY signals
- **RSI 30–40** → Mildly oversold — good for BUY  
- **RSI 40–60** → Neutral — ideal zone, both directions possible
- **RSI 60–70** → Mildly overbought — good for SELL
- **RSI > 70** → Overbought — strong SELL zone, caution for BUY

Weight in confidence: **15%**

The scanner requires RSI < 40 for BUY and RSI > 60 for SELL — not just direction, but magnitude.` },

  // ── ATR ─────────────────────────────────────────────────────────────────────
  { keys: ['atr','average true range','stop loss calculation','target calculation','volatility'],

    a: `**ATR = Average True Range** (14-day average daily range in ₹)

Used to set **position-specific** stop loss and target:

- **Target** = Entry + (ATR × 2) for BUY, Entry − (ATR × 2) for SELL
- **Stop Loss** = below ORB Low for BUY, above ORB High for SELL

Example: Stock at ₹1200, ATR = ₹18  
→ Target = ₹1200 + ₹36 = ₹1236  
→ R:R = ₹36 gain / ₹12 risk = 3:1

A higher ATR means wider stop loss but also larger targets. Weight in confidence: **5%** (used mainly for R:R calculation).` },

// ── Matcher ───────────────────────────────────────────────────────────────────
function cpAnswer(q){
  var lower = q.toLowerCase();
  var best = null, bestScore = 0;
  CP_KB.forEach(function(entry){
    var score = 0;
    entry.keys.forEach(function(k){
      if(lower.includes(k)) score += k.length; // longer keyword = higher weight
    });
    if(score > bestScore){ bestScore = score; best = entry; }
  });
  if(best && bestScore >= 3) return best.a;
  // Fallback
  return "I don\u2019t have a specific answer for that. Try asking about:\n\n" +
    "- **Signals**: BUY, SELL, WATCH conditions\n" +
    "- **Confidence score**: how it\u2019s calculated\n" +
    "- **ORB, VWAP, RSI, ATR**: what each indicator means\n" +
    "- **Macro layers**: how news/crude/FII affect signals\n" +
    "- **Alerts**: Telegram setup and triggers\n" +
    "- **Login / logout**: daily flow\n" +
    "- **Admin tab**: dry scan, DB, system status";
}


function cpToggle(){
  cpOpn=!cpOpn;
  var p=document.getElementById('chatPanel');
  if(cpOpn){
    p.classList.add('cp-open');
    if(!cpH.length) cpBot("<strong>Hi! I’m your NSE Scanner Assistant.</strong><br>Ask me anything about signals, confidence, ORB, VWAP, macro layers, Telegram alerts, login, or how to use the scanner.");
    setTimeout(function(){var i=document.getElementById('cpInp');if(i)i.focus();},240);
  } else { p.classList.remove('cp-open'); }
}

document.addEventListener('keydown',function(e){if(e.key==='Escape'&&cpOpn)cpToggle();});

function cpBot(html){var d=document.createElement('div');d.className='cp-b';d.innerHTML=html;var m=document.getElementById('cpMsgs');m.appendChild(d);m.scrollTop=m.scrollHeight;}
function cpUser(txt){var d=document.createElement('div');d.className='cp-u';d.textContent=txt;var m=document.getElementById('cpMsgs');m.appendChild(d);m.scrollTop=m.scrollHeight;}

function cpMd(t){
  return t
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<strong style="display:block;margin:8px 0 4px;color:#27500A;font-size:11px;text-transform:uppercase;letter-spacing:.05em;">$1</strong>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul style="padding-left:14px;margin:4px 0;">$1</ul>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" style="color:#185FA5;">$1</a>')
    .replace(/`([^`]+)`/g,'<code style="background:#f0f0f0;padding:1px 4px;border-radius:3px;font-size:11px;">$1</code>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>')
    .replace(/\|([^|\n]+)\|/g, function(m){ return '<span style="display:inline-block;padding:2px 6px;border:1px solid #e0e0e0;margin:1px;font-size:12px;">'+m.replace(/\|/g,'')+'</span>'; });
}

function cpAsk(q){document.getElementById('cpInp').value=q;cpSend();}

function cpSend(){
  if(cpBusy)return;
  var inp=document.getElementById('cpInp'),txt=inp.value.trim();
  if(!txt)return;
  inp.value='';inp.style.height='auto';
  cpBusy=true;document.getElementById('cpBtn').disabled=true;
  document.getElementById('cpSugs').style.display='none';
  cpUser(txt);
  // Small delay to feel natural
  setTimeout(function(){
    var answer = cpAnswer(txt);
    cpBot(cpMd(answer));
    cpBusy=false;document.getElementById('cpBtn').disabled=false;
    document.getElementById('cpInp').focus();
  }, 180);
}
</script>
