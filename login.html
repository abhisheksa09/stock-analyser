<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — NSE Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f5f5f0;color:#1a1a1a;min-height:100dvh;
  display:flex;flex-direction:column;
}

/* ── Top bar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid #e0e0e0;background:#fff;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{font-size:20px;}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.02em;}
.brand-ver{font-size:10px;color:#aaa;border:1px solid #e0e0e0;
  border-radius:20px;padding:2px 8px;background:#fafafa;}
.top-links{display:flex;gap:8px;}
.top-link{
  font-size:12px;color:#666;text-decoration:none;
  padding:5px 12px;border:1px solid #ddd;border-radius:20px;
  background:#fff;transition:all .15s;
}
.top-link:hover{border-color:#27500A;color:#27500A;background:#EAF3DE;}

/* ── Main ── */
.main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 24px;
}

/* ── Login card ── */
.card{
  width:100%;max-width:400px;
  background:#fff;border:1px solid #e0e0e0;border-radius:20px;
  padding:40px 36px;
  box-shadow:0 4px 32px rgba(0,0,0,.07);
  animation:fadeUp .3s ease;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:none}
}

/* ── Hero ── */
.hero{text-align:center;margin-bottom:32px;}
.hero-icon{
  width:72px;height:72px;border-radius:20px;
  background:#EAF3DE;border:2px solid #C0DD97;
  margin:0 auto 18px;display:flex;align-items:center;
  justify-content:center;font-size:32px;
}
.hero h1{font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:6px;}
.hero p{font-size:13px;color:#888;line-height:1.5;}

/* ── Divider ── */
.divider{height:1px;background:#f0f0f0;margin:0 0 24px;}

/* ── Status pill ── */
.status-row{
  display:flex;align-items:center;gap:8px;
  justify-content:center;margin-bottom:20px;
  min-height:20px;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:#e0e0e0;flex-shrink:0;
  transition:background .3s;
}
.status-dot.green{background:#639922;}
.status-dot.amber{background:#EF9F27;}
.status-dot.red{background:#E24B4A;}
.status-txt{font-size:13px;color:#888;}

/* ── Buttons ── */
.btn-primary{
  width:100%;display:flex;align-items:center;justify-content:center;
  gap:10px;padding:14px 20px;border-radius:12px;border:none;
  background:#27500A;color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:-.01em;margin-bottom:10px;
  transition:background .15s,transform .12s;font-family:inherit;
}
.btn-primary:hover{background:#1a3d07;transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}

.btn-enter{
  width:100%;padding:13px 20px;border-radius:12px;
  border:1px solid #C0DD97;background:#EAF3DE;color:#27500A;
  font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;
  transition:background .15s;font-family:inherit;
  display:none;
}
.btn-enter:hover{background:#d4edbc;}

/* ── Chips ── */
.chips{display:flex;justify-content:center;gap:8px;margin-top:20px;flex-wrap:wrap;}
.chip{
  font-size:11px;padding:4px 11px;border-radius:20px;
  border:1px solid #e0e0e0;color:#888;background:#fafafa;
}

/* ── Embedded chatbot ─────────────────────────────────────────────────────── */
#chatPanel{position:fixed;bottom:88px;right:24px;width:370px;height:540px;
  background:#fff;border:1px solid #e0e0e0;border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,.14);display:flex;flex-direction:column;
  z-index:9998;transform:scale(.92) translateY(20px);opacity:0;pointer-events:none;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .18s ease;}
#chatPanel.cp-open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
.cp-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-bottom:1px solid #f0f0f0;background:#EAF3DE;
  border-radius:16px 16px 0 0;flex-shrink:0;}
.cp-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#27500A;}
.cp-x{width:26px;height:26px;border-radius:6px;border:none;background:rgba(0,0,0,.07);
  color:#27500A;font-size:13px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .15s;}
.cp-x:hover{background:rgba(0,0,0,.15);}
.cp-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;
  gap:10px;scrollbar-width:thin;scrollbar-color:#e0e0e0 transparent;}
.cp-msgs::-webkit-scrollbar{width:3px;}
.cp-msgs::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
.cp-u{align-self:flex-end;max-width:86%;background:#EAF3DE;border:1px solid #C0DD97;
  border-radius:12px 4px 12px 12px;padding:8px 11px;font-size:13px;line-height:1.5;
  animation:cpUp .18s ease;}
.cp-b{align-self:flex-start;max-width:92%;background:#f8f8f6;border:1px solid #ebebeb;
  border-radius:4px 12px 12px 12px;padding:8px 11px;font-size:13px;line-height:1.55;
  animation:cpUp .18s ease;}
.cp-b code{font-family:monospace;font-size:11px;background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px;}
.cp-b strong{font-weight:600;}
.cp-b ul{padding-left:14px;margin:4px 0;}
.cp-b li{margin-bottom:2px;}
.cp-b p{margin-bottom:5px;}
.cp-b p:last-child{margin-bottom:0;}
@keyframes cpUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.cp-dots{display:flex;gap:4px;align-items:center;padding:4px 0;}
.cp-dots span{width:5px;height:5px;border-radius:50%;background:#bbb;animation:cpDt 1.2s ease-in-out infinite;}
.cp-dots span:nth-child(2){animation-delay:.2s;}
.cp-dots span:nth-child(3){animation-delay:.4s;}
@keyframes cpDt{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
.cp-sugs{display:flex;flex-wrap:nowrap;gap:6px;padding:0 12px 8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.cp-sugs::-webkit-scrollbar{display:none;}
.cp-sug{font-size:11px;padding:4px 9px;border-radius:16px;border:1px solid #ddd;
  background:#f9f9f7;color:#555;cursor:pointer;white-space:nowrap;transition:all .15s;}
.cp-sug:hover{border-color:#27500A;color:#27500A;background:#EAF3DE;}
.cp-foot{display:flex;gap:8px;padding:9px 12px;border-top:1px solid #f0f0f0;
  flex-shrink:0;background:#fff;border-radius:0 0 16px 16px;}
.cp-inp{flex:1;border:1px solid #ddd;border-radius:8px;padding:7px 10px;
  font-size:13px;font-family:inherit;outline:none;resize:none;max-height:72px;min-height:32px;transition:border-color .15s;}
.cp-inp:focus{border-color:#27500A;}
.cp-btn{width:32px;height:32px;border-radius:8px;border:none;background:#27500A;
  color:#fff;cursor:pointer;font-size:14px;font-weight:700;flex-shrink:0;
  transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;}
.cp-btn:hover{background:#1a3d07;transform:scale(1.05);}
.cp-btn:disabled{background:#ccc;transform:none;cursor:not-allowed;}
#chatFab{position:fixed;bottom:24px;right:24px;z-index:9999;width:52px;height:52px;
  border-radius:50%;background:#27500A;border:2px solid #4ade80;
  box-shadow:0 4px 20px rgba(74,222,128,.35);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:transform .18s,box-shadow .18s;
  animation:fabGl 3s ease-in-out infinite;}
#chatFab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(74,222,128,.6);}
@keyframes fabGl{0%,100%{box-shadow:0 4px 20px rgba(74,222,128,.35);}
  50%{box-shadow:0 4px 28px rgba(74,222,128,.65);}}
#chatFab::after{content:"Ask AI";position:absolute;right:60px;background:#1a1a1a;
  color:#4ade80;font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;
  border:1px solid #2a2a2a;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;}
#chatFab:hover::after{opacity:1;}
@media(max-width:440px){#chatPanel{width:calc(100vw - 16px);right:8px;bottom:78px;height:65dvh;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-icon">&#128200;</span>
    <span class="brand-name">NSE Scanner</span>
    <span class="brand-ver">v2.2.0</span>
  </div>
  <div class="top-links">
    <a href="readme.html" class="top-link">&#128214; Docs</a>
    <a href="changelog.html" class="top-link">&#127959; Changelog</a>
  </div>
</div>

<div class="main">
  <div class="card">

    <div class="hero">
      <div class="hero-icon">&#128200;</div>
      <h1>NSE Intraday Scanner</h1>
      <p>Real-time signals &middot; Macro intelligence &middot; Telegram alerts</p>
    </div>

    <div class="divider"></div>

    <div class="status-row">
      <span class="status-dot" id="sDot"></span>
      <span class="status-txt" id="sTxt">&nbsp;</span>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      &#128274;&nbsp; Login
    </button>

    <button class="btn-enter" id="enterBtn" onclick="goToScanner()">
      &#10003;&nbsp; Enter Scanner
    </button>

    <div class="chips">
      <span class="chip">30 Nifty stocks</span>
      <span class="chip">Telegram alerts</span>
      <span class="chip">4-layer macro</span>
    </div>

  </div>
</div>

<script>
const PROXY = 'https://nse-proxy-mojx.onrender.com';

// ── Check if already logged in ────────────────────────────────────────────────
async function checkLogin(){
  setDot('amber', 'Checking\u2026');
  try{
    var r = await fetch(PROXY + '/get-token');
    if(!r.ok){ setDot('', 'Login to continue'); return; }
    var d = await r.json();
    if(d.status === 'ok' && d.token){
      // Token on server — verify it's still valid
      try{
        var pr = await fetch(PROXY + '/v2/user/profile', {
          headers: { 'Authorization': 'Bearer ' + d.token, 'Accept': 'application/json' }
        });
        var pd = await pr.json();
        if(pd.data){
          var name = pd.data.full_name || pd.data.user_name || pd.data.name || 'user';
          setDot('green', '\u2713 Logged in as ' + name);
          styleLoginBtn(true);
          document.getElementById('enterBtn').style.display = 'block';
          // Auto-redirect after brief pause
          setTimeout(goToScanner, 1500);
          return;
        }
      } catch(e2){}
    }
    setDot('', 'Login to continue');
  } catch(e){
    setDot('red', 'Cannot reach server');
  }
}

function setDot(cls, txt){
  var dot = document.getElementById('sDot');
  var t   = document.getElementById('sTxt');
  dot.className = 'status-dot' + (cls ? ' ' + cls : '');
  t.textContent = txt;
  t.style.color = cls === 'green' ? '#27500A' : cls === 'red' ? '#A32D2D' : '#888';
}

function styleLoginBtn(loggedIn){
  var btn = document.getElementById('loginBtn');
  if(loggedIn){
    btn.innerHTML = '&#128274;&nbsp; Re-login with Upstox';
    btn.style.background = '#EAF3DE';
    btn.style.color = '#27500A';
    btn.style.border = '1px solid #C0DD97';
  } else {
    btn.innerHTML = '&#128274;&nbsp; Login';
    btn.style.background = '#27500A';
    btn.style.color = '#fff';
    btn.style.border = 'none';
  }
}

// ── OAuth login ───────────────────────────────────────────────────────────────
function doLogin(){
  var w = 520, h = 640;
  var left = Math.round(screen.width/2 - w/2);
  var top  = Math.round(screen.height/2 - h/2);
  var pop  = window.open(
    PROXY + '/auth/login', 'upstox_login',
    'width='+w+',height='+h+',left='+left+',top='+top+
    ',toolbar=no,menubar=no,scrollbars=yes,resizable=yes'
  );
  if(!pop){ window.location.href = PROXY + '/auth/login'; return; }

  // Listen for success postMessage from popup
  var handler = function(e){
    if(e.data && e.data.type === 'upstox_auth_success'){
      window.removeEventListener('message', handler);
      setDot('amber', 'Login successful \u2014 syncing\u2026');
      setTimeout(checkLogin, 900);
    }
  };
  window.addEventListener('message', handler);
}

// ── Go to scanner ─────────────────────────────────────────────────────────────
function goToScanner(){
  window.location.href = 'scanner.html';
}

// ── Init ──────────────────────────────────────────────────────────────────────
checkLogin();
</script>

  <!-- Chatbot FAB + Panel -->
  <div id="chatPanel">
    <div class="cp-hdr">
      <div class="cp-title"><span>&#129302;</span><span>Scanner Assistant</span></div>
      <button class="cp-x" onclick="cpToggle()" title="Close (Esc)">&#10005;</button>
    </div>
    <div class="cp-msgs" id="cpMsgs"></div>
    <div class="cp-sugs" id="cpSugs">
      <button class="cp-sug" onclick="cpAsk('How does confidence score work?')">Confidence</button>
      <button class="cp-sug" onclick="cpAsk('What is ORB?')">ORB</button>
      <button class="cp-sug" onclick="cpAsk('How do I login?')">Login help</button>
      <button class="cp-sug" onclick="cpAsk('How do Telegram alerts fire?')">Alerts</button>
      <button class="cp-sug" onclick="cpAsk('What are the 4 macro layers?')">Macro</button>
    </div>
    <div class="cp-foot">
      <textarea class="cp-inp" id="cpInp" rows="1"
        placeholder="Ask about the scanner…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();cpSend();}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,72)+'px'"></textarea>
      <button class="cp-btn" id="cpBtn" onclick="cpSend()">&#8593;</button>
    </div>
  </div>
  <div id="chatFab" onclick="cpToggle()" title="Ask the Scanner Assistant" aria-label="Open chat">
    <span style="font-size:22px;line-height:1;pointer-events:none;">&#129302;</span>
  </div>

  <script>
var cpH=[],cpBusy=false,cpOpn=false;
var CP_PROXY='https://nse-proxy-mojx.onrender.com';
function cpToggle(){
  cpOpn=!cpOpn;
  var p=document.getElementById('chatPanel');
  if(cpOpn){
    p.classList.add('cp-open');
    if(!cpH.length) cpBot("<strong>Hi! I’m your NSE Scanner Assistant.</strong><br>Ask me anything about signals, confidence, alerts, macros, or how to use the scanner.");
    setTimeout(function(){var i=document.getElementById('cpInp');if(i)i.focus();},240);
  } else { p.classList.remove('cp-open'); }
}
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&cpOpn)cpToggle();});
function cpBot(html){var d=document.createElement('div');d.className='cp-b';d.innerHTML=html;var m=document.getElementById('cpMsgs');m.appendChild(d);m.scrollTop=m.scrollHeight;}
function cpUser(txt){var d=document.createElement('div');d.className='cp-u';d.textContent=txt;var m=document.getElementById('cpMsgs');m.appendChild(d);m.scrollTop=m.scrollHeight;}
function cpTyping(){var d=document.createElement('div');d.className='cp-b cp-dots';d.id='cpTyping';d.innerHTML='<span></span><span></span><span></span>';var m=document.getElementById('cpMsgs');m.appendChild(d);m.scrollTop=m.scrollHeight;}
function cpRm(){var t=document.getElementById('cpTyping');if(t)t.remove();}
function cpMd(t){return t.replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre style="background:#f0f0ed;padding:7px;border-radius:5px;overflow-x:auto;font-size:11px;margin:4px 0;"><code>$1</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/^#{1,3} (.+)$/gm,'<strong style="display:block;margin:7px 0 3px;color:#27500A;font-size:11px;text-transform:uppercase;letter-spacing:.05em;">$1</strong>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/^[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul style="padding-left:14px;margin:4px 0;">$1</ul>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/^(.)/,'<p>$1').replace(/(.)$/,'$1</p>');}
function cpAsk(q){document.getElementById('cpInp').value=q;cpSend();}
async function cpSend(){
  if(cpBusy)return;
  var inp=document.getElementById('cpInp'),txt=inp.value.trim();
  if(!txt)return;
  inp.value='';inp.style.height='auto';
  cpBusy=true;document.getElementById('cpBtn').disabled=true;
  document.getElementById('cpSugs').style.display='none';
  cpUser(txt);cpH.push({role:'user',content:txt});cpTyping();
  try{
    var res=await fetch(CP_PROXY+'/chat',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:cpH,max_tokens:768})});
    var d=await res.json();cpRm();
    if(d.error){var em=typeof d.error==='object'?d.error.message:String(d.error);
      cpBot('<span style="color:#A32D2D">&#9888; '+em+'</span><br><small style="color:#999">Check ANTHROPIC_API_KEY is set in Render env vars.</small>');}
    else{var rep=(d.content&&d.content[0]&&d.content[0].text)||'No response.';
      cpBot(cpMd(rep));cpH.push({role:'assistant',content:rep});
      if(cpH.length>30)cpH=cpH.slice(-30);}
  }catch(e){cpRm();cpBot('<span style="color:#A32D2D">&#9888; Could not reach server.</span>');}
  cpBusy=false;document.getElementById('cpBtn').disabled=false;
  document.getElementById('cpInp').focus();
}
  </script>
</body>
</html>
