<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Render Proxy Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    input, button { margin: 5px 0; padding: 5px; }
    pre { background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>
  <h1>Render Proxy Test</h1>

  <div>
    <h2>Write Data</h2>
    <label>Path: <input type="text" id="writePath" value="test.json"></label><br>
    <label>Data (JSON array):</label><br>
    <textarea id="writeData" rows="4" cols="50">[{"symbol":"ICICIBANK","price":525}]</textarea><br>
    <button onclick="writeHistory()">Write</button>
  </div>

  <div>
    <h2>Read Data</h2>
    <label>Path: <input type="text" id="readPath" value="test.json"></label><br>
    <button onclick="readHistory()">Read</button>
  </div>

  <h2>Response</h2>
  <pre id="response"></pre>

  <script>
    const BASE_URL = "https://nse-proxy-mojx.onrender.com"; // Replace with your Render URL

    async function writeHistory() {
      const path = document.getElementById("writePath").value;
      const data = document.getElementById("writeData").value;

      try {
        const res = await fetch(`${BASE_URL}/history/write?path=${encodeURIComponent(path)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: data
        });
        const json = await res.json();
        document.getElementById("response").textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        document.getElementById("response").textContent = "Error: " + err;
      }
    }

    async function readHistory() {
      const path = document.getElementById("readPath").value;

      try {
        const res = await fetch(`${BASE_URL}/history/read?path=${encodeURIComponent(path)}`);
        const json = await res.json();
        document.getElementById("response").textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        document.getElementById("response").textContent = "Error: " + err;
      }
    }
  </script>
</body>
</html>
